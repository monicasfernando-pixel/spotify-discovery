<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#509bf5"/>
    </marker>
    <style>
      .title { fill: #1ed760; font-size: 18px; font-weight: 700; }
      .box { fill: #181a20; stroke: #509bf5; stroke-width: 1.5; rx: 8; }
      .stage { fill: #12141a; stroke: #262b36; stroke-width: 1; rx: 12; }
      .label { fill: #f2f2f2; font-size: 13px; text-anchor: middle; }
      .stage-label { fill: #9aa0ab; font-size: 12px; font-weight: 700; }
      .line { stroke: #509bf5; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
      .data { stroke: #1DB954; }
    </style>
  </defs>
  <rect width="900" height="560" fill="#0f1115"/>
  <text x="450" y="36" class="title" text-anchor="middle">Application architecture</text>

  <rect x="40" y="70" width="820" height="120" class="stage"/>
  <text x="60" y="92" class="stage-label">Streamlit UI (app/app.py)</text>
  <rect x="70" y="105" width="130" height="36" class="box"/><text x="135" y="128" class="label">Funnel</text>
  <rect x="220" y="105" width="130" height="36" class="box"/><text x="285" y="128" class="label">Two Sources</text>
  <rect x="370" y="105" width="130" height="36" class="box"/><text x="435" y="128" class="label">Six Questions</text>
  <rect x="520" y="105" width="130" height="36" class="box"/><text x="585" y="128" class="label">Explorer</text>
  <rect x="670" y="105" width="150" height="36" class="box"/><text x="745" y="128" class="label">Live Tagger</text>

  <rect x="40" y="230" width="380" height="100" class="stage"/>
  <text x="60" y="252" class="stage-label">Data layer</text>
  <rect x="80" y="265" width="280" height="40" class="box data"/><text x="220" y="290" class="label">tagged_reviews.csv</text>
  <rect x="80" y="315" width="280" height="40" class="box data"/><text x="220" y="340" class="label">qualitative_coded.csv</text>

  <rect x="480" y="230" width="380" height="100" class="stage"/>
  <text x="500" y="252" class="stage-label">External</text>
  <rect x="520" y="275" width="160" height="40" class="box"/><text x="600" y="300" class="label">User review text</text>
  <rect x="700" y="275" width="140" height="40" class="box"/><text x="770" y="300" class="label">Anthropic API</text>

  <rect x="300" y="390" width="300" height="44" class="box"/><text x="450" y="417" class="label">Tag result JSON</text>

  <!-- Data to tabs -->
  <line x1="220" y1="265" x2="135" y2="141" class="line"/>
  <line x1="220" y1="265" x2="285" y2="141" class="line"/>
  <line x1="220" y1="265" x2="435" y2="141" class="line"/>
  <line x1="220" y1="265" x2="585" y2="141" class="line"/>
  <line x1="220" y1="315" x2="285" y2="141" class="line"/>
  <line x1="220" y1="315" x2="585" y2="141" class="line"/>

  <!-- Live tagger flow -->
  <line x1="600" y1="275" x2="745" y2="141" class="line"/>
  <line x1="745" y1="141" x2="770" y2="275" class="line"/>
  <line x1="770" y1="315" x2="450" y2="390" class="line"/>
  <line x1="450" y1="434" x2="745" y2="141" class="line"/>

  <text x="450" y="520" fill="#6b7280" font-size="12" text-anchor="middle">Tabs 1-4 use CSVs only � Tab 5 needs ANTHROPIC_API_KEY in .streamlit/secrets.toml</text>
</svg>
